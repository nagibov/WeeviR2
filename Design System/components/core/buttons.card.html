<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;font-family:var(--font-text);background:#fff;display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
button{font-family:var(--font-text);font-weight:700;border:none;cursor:pointer;border-radius:var(--radius-pill);display:inline-flex;align-items:center;gap:8px;line-height:1}
.md{font-size:15px;padding:13px 24px}.sm{font-size:14px;padding:10px 18px}
.primary{background:var(--color-primary);color:#fff;box-shadow:var(--shadow-pop)}
.dark{background:var(--text-strong);color:#fff}
.secondary{background:#fff;color:var(--text-strong);border:1.5px solid var(--border-default)}
.tertiary{background:var(--color-accent-soft);color:var(--text-success)}
.text{background:transparent;color:var(--text-success);padding:10px 8px}</style></head>
<body>
  <div class="row">
    <button class="primary md">Get started</button>
    <button class="dark md">Book a demo</button>
    <button class="secondary md">Learn more</button>
  </div>
  <div class="row">
    <button class="tertiary sm">Tertiary</button>
    <button class="text sm">View report →</button>
    <button class="primary md" style="opacity:.45;cursor:not-allowed">Disabled</button>
  </div>
</body></html>
