<!-- @dsCard group="Colors" viewport="700x150" name="Status colours" subtitle="Positive, negative, upcoming" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;font-family:var(--font-text);background:#fff;display:flex;gap:14px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:9px 16px;border-radius:8px}
.dot{width:9px;height:9px;border-radius:50%}</style></head>
<body>
  <span class="chip" style="background:var(--wv-mint-wash);color:var(--text-success)"><span class="dot" style="background:var(--wv-green)"></span>Positive · #0A8F63</span>
  <span class="chip" style="background:#fdeceb;color:var(--wv-negative)"><span class="dot" style="background:var(--wv-negative)"></span>Negative · #C0392B</span>
  <span class="chip" style="background:var(--wv-amber-bg);color:var(--wv-amber-text)"><span class="dot" style="background:var(--wv-amber)"></span>Upcoming · #E0962F</span>
</body></html>
