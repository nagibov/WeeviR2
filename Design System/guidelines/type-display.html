<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:#fff;color:var(--wv-ink)}

.row{display:flex;gap:20px;margin-top:14px;align-items:baseline}
.row span{font-family:var(--font-display);font-size:22px}</style></head>
<body>
  <div class="big">Aa 2026</div>
  <div class="row">
    <span style="font-weight:400;color:var(--wv-muted)">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">SemiBold</span>
    <span style="font-weight:700">Bold</span>
  </div>
</body></html>
