<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;font-family:var(--font-text);background:#fff;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.box{border-radius:16px;height:120px;display:flex;align-items:center;justify-content:center}
.box img{height:38px;width:auto}
.note{grid-column:1/-1;font-size:12px;color:var(--wv-muted);font-weight:500}</style></head>
<body>
  <div class="box" style="background:#fff;box-shadow:inset 0 0 0 1px var(--wv-border)"><img src="../assets/weevi-logo.png"></div>
  <div class="box" style="background:var(--wv-surface)"><img src="../assets/weevi-logo.png"></div>
  <div class="box" style="background:var(--wv-ink)"><img src="../assets/weevi-logo.png" style="filter:brightness(0) invert(1)"></div>
  <div class="note">The emerald drop stays green on every background. On dark surfaces the wordmark goes white; never recolour the letters or detach the drop. Clearspace = cap-height on all sides.</div>
</body></html>
