<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;font-family:var(--font-text);background:var(--wv-page);display:flex;gap:24px;align-items:center}
.c{background:#fff;border-radius:14px;width:150px;height:84px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--wv-ink);text-align:center}</style></head>
<body>
  <div class="c" style="box-shadow:var(--shadow-card)">shadow-card<br><span style="font-weight:500;color:var(--wv-muted)">resting</span></div>
  <div class="c" style="box-shadow:var(--shadow-pop);background:var(--wv-green);color:#fff">shadow-pop<br><span style="font-weight:500;opacity:.85">button</span></div>
  <div class="c" style="box-shadow:var(--shadow-green)">shadow-green<br><span style="font-weight:500;color:var(--wv-muted)">emphasis</span></div>
</body></html>
