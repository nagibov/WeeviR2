<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & tints" subtitle="Surfaces, borders, text greys" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;font-family:var(--font-text);background:#fff;display:flex;gap:10px}
.sw{flex:1;border-radius:10px;padding:9px;display:flex;flex-direction:column;justify-content:flex-end;height:96px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.n{font-weight:700;font-size:12px;color:var(--wv-ink)}.h{font-weight:500;font-size:10px;color:var(--wv-muted)}</style></head>
<body>
  <div class="sw" style="background:var(--wv-mint-tint)"><div class="n">Mint Tint</div><div class="h">#EAFBF3</div></div>
  <div class="sw" style="background:var(--wv-mint-wash)"><div class="n">Mint Wash</div><div class="h">#F1FDF7</div></div>
  <div class="sw" style="background:var(--wv-off-white)"><div class="n">Off-white</div><div class="h">#FAFBFA</div></div>
  <div class="sw" style="background:var(--wv-surface)"><div class="n">Surface</div><div class="h">#F0F2F1</div></div>
  <div class="sw" style="background:var(--wv-border)"><div class="n">Border</div><div class="h">#E3E6E4</div></div>
  <div class="sw" style="background:var(--wv-muted)"><div class="n" style="color:#fff">Muted Text</div><div class="h" style="color:#fff">#8A8F8C</div></div>
</body></html>
