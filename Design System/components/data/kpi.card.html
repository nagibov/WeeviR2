<!-- @dsCard group="Components" viewport="700x230" name="KPI Card" subtitle="Metric tile — light / mint / green / dark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;font-family:var(--font-text);background:var(--wv-page);display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.c{border-radius:var(--radius-lg);padding:22px}
.l{font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.v{font-weight:800;font-size:38px;line-height:1;margin-top:12px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.t{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-weight:700;font-size:12px;padding:4px 10px;border-radius:var(--radius-pill);white-space:nowrap}
.s{font-weight:500;font-size:12px;margin-top:12px}</style></head>
<body>
  <div class="c" style="background:#fff;box-shadow:var(--shadow-card)"><div class="l" style="color:var(--wv-muted)">Total Revenue</div><div class="v" style="color:var(--wv-ink)">$929K</div><div class="t" style="background:var(--color-accent-soft);color:var(--text-success)">▲ 75% YoY</div></div>
  <div class="c" style="background:var(--color-accent-soft)"><div class="l" style="color:#5a9b80">MRR</div><div class="v" style="color:var(--text-success)">$54K</div><div class="s" style="color:#5a9b80">Monthly recurring</div></div>
  <div class="c" style="background:var(--wv-green);box-shadow:var(--shadow-green)"><div class="l" style="color:rgba(255,255,255,.85)">Active Accounts</div><div class="v" style="color:#fff">246</div><div class="s" style="color:rgba(255,255,255,.9)">1,082 branches</div></div>
  <div class="c" style="background:var(--wv-ink)"><div class="l" style="color:rgba(255,255,255,.6)">Orders / year</div><div class="v" style="color:#fff">1.3M</div><div class="s" style="color:var(--wv-green)">320K+ users</div></div>
</body></html>
