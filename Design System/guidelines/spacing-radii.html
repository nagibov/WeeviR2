<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="8 / 12 / 18 / 28 / pill" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;font-family:var(--font-text);background:#fff;display:flex;gap:16px;align-items:flex-end}
.b{background:var(--wv-mint-tint);box-shadow:inset 0 0 0 1.5px var(--wv-green);width:84px;height:72px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-weight:700;font-size:11px;color:var(--wv-green-deep)}</style></head>
<body>
  <div class="b" style="border-radius:var(--radius-sm)">8 · sm</div>
  <div class="b" style="border-radius:var(--radius-md)">12 · md</div>
  <div class="b" style="border-radius:var(--radius-lg)">18 · lg</div>
  <div class="b" style="border-radius:var(--radius-xl)">28 · xl</div>
  <div class="b" style="border-radius:var(--radius-pill);width:110px">999 · pill</div>
</body></html>
