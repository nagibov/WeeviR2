<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;font-family:var(--font-text);background:#fff;display:flex;gap:14px}
.sw{flex:1;border-radius:12px;padding:14px;display:flex;flex-direction:column;justify-content:flex-end;height:120px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.n{font-weight:700;font-size:14px}.h{font-weight:600;font-size:12px;opacity:.8}</style></head>
<body>
  <div class="sw" style="background:var(--wv-green)"><div class="n" style="color:#fff">Weevi Green</div><div class="h" style="color:#fff">#09D18C</div></div>
  <div class="sw" style="background:var(--wv-green-deep)"><div class="n" style="color:#fff">Deep Green</div><div class="h" style="color:#fff">#0A8F63</div></div>
  <div class="sw" style="background:var(--wv-ink)"><div class="n" style="color:#fff">Charcoal Ink</div><div class="h" style="color:#fff">#2E2E2F</div></div>
</body></html>
