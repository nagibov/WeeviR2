<!-- @dsCard group="Brand" viewport="700x180" name="Iconography — Lucide" subtitle="Charcoal 2px stroke + one emerald accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px 24px;font-family:var(--font-text);background:#fff}
.grid{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.tile{position:relative;display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:var(--radius-md);background:var(--wv-off-white);box-shadow:inset 0 0 0 1px var(--border-default);color:var(--wv-ink)}
.tile svg{width:28px;height:28px}
.acc::after{content:"";position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%;background:var(--color-primary);box-shadow:0 0 0 2px #fff}
.cap{margin-top:14px;font-weight:500;font-size:12px;color:var(--wv-muted)}</style></head>
<body>
  <div class="grid">
    <span class="tile acc"><i data-lucide="store"></i></span>
    <span class="tile acc"><i data-lucide="utensils"></i></span>
    <span class="tile acc"><i data-lucide="credit-card"></i></span>
    <span class="tile acc"><i data-lucide="truck"></i></span>
    <span class="tile acc"><i data-lucide="bar-chart-3"></i></span>
    <span class="tile acc"><i data-lucide="users"></i></span>
    <span class="tile acc"><i data-lucide="bell"></i></span>
    <span class="tile acc"><i data-lucide="map-pin"></i></span>
  </div>
  <div class="cap">Lucide · 2px rounded strokes · charcoal glyph with a single emerald accent dot. Emerald never recolours the stroke itself.</div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body></html>
