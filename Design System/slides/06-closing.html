<!-- @dsCard group="Slides" viewport="1280x720" name="Closing slide" subtitle="Key highlights — gradient closing" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  .slide{position:relative;width:1280px;height:720px;overflow:hidden;font-family:var(--font-text);background:var(--wv-gradient);-webkit-font-smoothing:antialiased}
  .motif{position:absolute;inset:0;background-image:radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 1.7px);background-size:30px 30px;-webkit-mask-image:linear-gradient(115deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.5) 70%,rgba(0,0,0,0) 98%);mask-image:linear-gradient(115deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.5) 70%,rgba(0,0,0,0) 98%)}
  .inner{position:relative;height:100%;padding:64px 80px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between}
  .top img{height:26px}
  .eyebrow{font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--wv-green-deep)}
  h2{font-family:var(--font-display);font-weight:700;font-size:54px;letter-spacing:-.02em;color:var(--wv-ink);margin:24px 0 0}
  .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14px 40px;margin-top:30px;align-content:center}
  .hl{display:flex;align-items:center;gap:16px}
  .ck{flex:none;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:var(--wv-green);color:#fff;box-shadow:var(--shadow-pop)}
  .ck svg{width:20px;height:20px}
  .hl span{font-weight:600;font-size:20px;color:var(--wv-ink)}
  .foot{display:flex;align-items:center;justify-content:space-between}
  .ty{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--wv-ink)}
  .conf{font-weight:600;font-size:14px;color:var(--wv-muted)}
</style></head>
<body>
  <div class="slide">
    <div class="motif"></div>
    <div class="inner">
      <div class="top"><span class="eyebrow">Key Highlights</span><img src="../assets/weevi-logo.png" alt="Weevi"></div>
      <h2>Where Weevi stands today</h2>
      <div class="grid">
        <div class="hl"><span class="ck"><i data-lucide="trending-up"></i></span><span>Break-even achieved</span></div>
        <div class="hl"><span class="ck"><i data-lucide="dollar-sign"></i></span><span>MRR up from ~$31K to ~$54K</span></div>
        <div class="hl"><span class="ck"><i data-lucide="store"></i></span><span>246 active accounts</span></div>
        <div class="hl"><span class="ck"><i data-lucide="git-branch"></i></span><span>1,082 branches</span></div>
        <div class="hl"><span class="ck"><i data-lucide="file-signature"></i></span><span>141 new projects signed</span></div>
        <div class="hl"><span class="ck"><i data-lucide="users"></i></span><span>320K+ active users</span></div>
        <div class="hl"><span class="ck"><i data-lucide="shopping-bag"></i></span><span>1.3M orders / year processed</span></div>
        <div class="hl"><span class="ck"><i data-lucide="globe"></i></span><span>Lebanon · KSA · UK · international</span></div>
      </div>
      <div class="foot"><span class="ty">Thank you.</span><span class="conf">© 2026 Weevi · Confidential</span></div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body></html>
