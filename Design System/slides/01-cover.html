<!-- @dsCard group="Slides" viewport="1280x720" name="Cover slide" subtitle="Gradient + growth motif title slide" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  .slide{position:relative;width:1280px;height:720px;overflow:hidden;font-family:var(--font-text);background:var(--wv-gradient);-webkit-font-smoothing:antialiased}
  .motif{position:absolute;inset:0;background-image:radial-gradient(circle, rgba(255,255,255,.9) 1.5px, transparent 1.7px);background-size:30px 30px;-webkit-mask-image:linear-gradient(115deg,rgba(0,0,0,0) 32%,rgba(0,0,0,.55) 68%,rgba(0,0,0,0) 96%);mask-image:linear-gradient(115deg,rgba(0,0,0,0) 32%,rgba(0,0,0,.55) 68%,rgba(0,0,0,0) 96%)}
  .inner{position:relative;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:72px 80px}
  .logo{height:34px;width:auto;display:block;align-self:flex-start}
  .eyebrow{font-weight:700;font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--wv-green-deep)}
  h1{font-family:var(--font-display);font-weight:700;font-size:92px;line-height:.98;letter-spacing:-.02em;color:var(--wv-ink);margin:24px 0 0}
  .sub{font-weight:500;font-size:22px;line-height:1.55;color:var(--wv-body);max-width:60ch;margin:26px 0 0}
  .foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pill{font-weight:600;font-size:15px;padding:11px 20px;border-radius:var(--radius-pill);background:rgba(255,255,255,.72);color:var(--wv-ink)}
  .pill.dark{background:var(--wv-ink);color:#fff}
</style></head>
<body>
  <div class="slide">
    <div class="motif"></div>
    <div class="inner">
      <img class="logo" src="../assets/weevi-logo.png" alt="Weevi">
      <div>
        <div class="eyebrow">2026 Investors Report</div>
        <h1>Growth,<br>accelerated.</h1>
        <p class="sub">Weevi has crossed break-even and entered a scalable revenue phase — expanding across Lebanon, KSA and the UK while diversifying into payments, delivery and AI ordering.</p>
      </div>
      <div class="foot">
        <span class="pill dark">May 2026</span>
        <span class="pill">320K+ users</span>
        <span class="pill">1.3M orders / year</span>
        <span class="pill">Break-even reached</span>
      </div>
    </div>
  </div>
</body></html>
